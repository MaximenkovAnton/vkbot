databaseChangeLog:
  - changeSet:
      id: 004-create-summaries-table
      author: vk-bot
      changes:
        - createTable:
            tableName: summaries
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: peer_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: first_message_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: last_message_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: full_summary
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: short_summary
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - createIndex:
            tableName: summaries
            indexName: idx_summaries_peer_id
            columns:
              - column:
                  name: peer_id

        - createIndex:
            tableName: summaries
            indexName: idx_summaries_peer_id_created_at
            columns:
              - column:
                  name: peer_id
              - column:
                  name: created_at
