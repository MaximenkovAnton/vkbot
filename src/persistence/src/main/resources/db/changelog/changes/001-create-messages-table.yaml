databaseChangeLog:
  - changeSet:
      id: 001-create-messages-table
      author: vk-bot
      changes:
        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: from_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: group_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: peer_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: conversation_message_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: message_text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: forwarded_messages
                  type: JSONB
                  constraints:
                    nullable: true

        - createIndex:
            tableName: messages
            indexName: idx_messages_from_id
            columns:
              - column:
                  name: from_id

        - createIndex:
            tableName: messages
            indexName: idx_messages_peer_id
            columns:
              - column:
                  name: peer_id

        - createIndex:
            tableName: messages
            indexName: idx_messages_date
            columns:
              - column:
                  name: date
